{% extends "base.html" %}

{% block title %}{{ _('survey.create_survey') }} - Survey System{% endblock %}

{% block content %}
<div class="container" style="margin-top: 40px;">
    <h1 style="color: #1a1a1a; margin-bottom: 30px;">{{ _('survey.create_survey') }}</h1>

    <div class="card">
        <form method="POST" action="{{ url_for('admin.create_survey') }}">
            <!-- 基本信息 -->
            <h3 style="margin-bottom: 20px;">Basic Information</h3>

            <div class="form-group">
                <label class="form-label">{{ _('survey.title') }} *</label>
                <input type="text" name="title_zh" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">{{ _('survey.description') }}</label>
                <textarea name="description_zh" class="form-control"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">{{ _('survey.start_time') }}</label>
                <input type="datetime-local" name="start_time" class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">{{ _('survey.end_time') }}</label>
                <input type="datetime-local" name="end_time" class="form-control">
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" name="allow_anonymous" checked>
                    {{ _('survey.allow_anonymous') }}
                </label>
            </div>

            <hr style="margin: 30px 0;">

            <!-- 问题列表 -->
            <h3 style="margin-bottom: 20px;">Questions</h3>
            <div id="questions-container"></div>

            <button type="button" class="btn btn-secondary" onclick="addQuestion()">
                {{ _('question.add_question') }}
            </button>

            <input type="hidden" id="question_count" name="question_count" value="0">

            <hr style="margin: 30px 0;">

            <!-- 提交按钮 -->
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary">{{ _('common.save') }}</button>
                <a href="{{ url_for('admin.survey_list') }}" class="btn btn-secondary">{{ _('common.cancel') }}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
